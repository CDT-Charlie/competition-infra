---
- name: Check if Tailscale is already installed
  ansible.windows.win_reg_stat:
    path: HKLM:\SOFTWARE\Tailscale IPN
  register: tailscale_installed

- name: Download latest Tailscale installer via PowerShell
  ansible.windows.win_shell: |
    $page = Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/" -UseBasicParsing
    $exe = ($page.Links | Where-Object { $_.href -match "tailscale-setup-full.*\.exe$" } | Select-Object -First 1).href
    $fullUrl = "https://pkgs.tailscale.com/stable/$exe"
    Invoke-WebRequest -Uri $fullUrl -OutFile "C:\Windows\Temp\tailscale-setup.exe" -UseBasicParsing
  when: not tailscale_installed.exists

- name: Install Tailscale silently
  ansible.windows.win_command: C:\Windows\Temp\tailscale-setup.exe /S
  when: not tailscale_installed.exists

- name: Wait for Tailscale service to be available
  ansible.windows.win_service:
    name: Tailscale
  register: tailscale_svc
  until: tailscale_svc.state is defined
  retries: 10
  delay: 5

- name: Ensure Tailscale service is running
  ansible.windows.win_service:
    name: Tailscale
    state: started
    start_mode: auto

- name: Authenticate Tailscale with authkey
  ansible.windows.win_shell: |
    & "C:\Program Files\Tailscale\tailscale.exe" up --authkey="{{ tailscale_authkey }}" {{ tailscale_args }}
  register: tailscale_up
  changed_when: "'already authenticated' not in tailscale_up.stderr"
  no_log: true

- name: Wait for Tailscale to reach a connected state
  ansible.windows.win_shell: |
    & "C:\Program Files\Tailscale\tailscale.exe" status
  register: tailscale_status
  until: "'NoState' not in tailscale_status.stdout and tailscale_status.rc == 0"
  retries: 12
  delay: 5
  changed_when: false

- name: Show Tailscale status
  debug:
    msg: "{{ tailscale_status.stdout_lines }}"
