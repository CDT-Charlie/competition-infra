---
- name: Check if Tailscale is already installed
  win_reg_key:
    path: HKLM:\SOFTWARE\Tailscale IPN
  register: tailscale_installed
  ignore_errors: true

- name: Download Tailscale installer
  win_get_url:
    url: https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.exe
    dest: C:\Windows\Temp\tailscale-setup.exe
  when: tailscale_installed.failed

- name: Install Tailscale silently
  win_command: C:\Windows\Temp\tailscale-setup.exe /S
  when: tailscale_installed.failed

- name: Wait for Tailscale service to be available
  win_service:
    name: Tailscale
  register: tailscale_svc
  until: tailscale_svc.state is defined
  retries: 10
  delay: 5

- name: Ensure Tailscale service is running
  win_service:
    name: Tailscale
    state: started
    start_mode: auto

- name: Authenticate Tailscale with authkey
  win_command: >
    "C:\Program Files\Tailscale\tailscale.exe" up
    --authkey={{ tailscale_authkey }}
    {{ tailscale_args }}
  register: tailscale_up
  changed_when: "'already authenticated' not in tailscale_up.stderr"
  no_log: true

- name: Verify Tailscale is connected
  win_command: '"C:\Program Files\Tailscale\tailscale.exe" status'
  register: tailscale_status
  changed_when: false

- name: Show Tailscale status
  debug:
    msg: "{{ tailscale_status.stdout_lines }}"
