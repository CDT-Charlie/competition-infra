---
- name: Install Tailscale on Linux hosts
  hosts: linux
  gather_facts: true
  vars_files:
    - secrets.yml
  roles:
    - tailscale_linux

- name: Install Tailscale on Windows hosts
  hosts: windows
  gather_facts: false
  vars_files:
    - secrets.yml
  roles:
    - tailscale_windows

- name: Install Tailscale on Linux subnet routers
  hosts: linux_subnet_routers
  gather_facts: true
  vars_files:
    - secrets.yml
  roles:
    - tailscale_linux_subnet_router