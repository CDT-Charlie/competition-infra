---
# Linux connection settings
ansible_user: greyteam
ansible_ssh_private_key_file: ~/.ssh/id_rsa
ansible_become: true
ansible_become_method: sudo
# ansible_ssh_pass: <password>  # Uncomment if using password auth instead of key

# Tailscale settings (authkey loaded from secrets.yml)
tailscale_args: "--accept-routes --ssh "