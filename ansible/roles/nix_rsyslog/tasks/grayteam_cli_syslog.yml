---
- name: Configure rsyslog clients
  hosts: syslog_clients_gray
  become: true

  tasks:
    - name: Install rsyslog
      package:
        name: rsyslog
        state: present

    - name: Enable rsyslog service
      service:
        name: rsyslog
        enabled: yes
        state: started

    - name: Configure log forwarding to central server 
      copy:
        dest: /etc/rsyslog.d/90-forward.conf
        mode: '0644'
        content: |
          if $programname == 'scorecheck' then {
            *.* @@{{ hostvars[groups['blue1-backcheck'][0]].ansible_host | default(groups['blue1-backcheck'][0]) }}:514
            *.* @@{{ hostvars[groups['blue2-backcheck'][1]].ansible_host | default(groups['blue2-backcheck'][1]) }}:514
            stop
          }
      notify: Restart rsyslog

  handlers:
    - name: Restart rsyslog
      service:
        name: rsyslog
        state: restarted