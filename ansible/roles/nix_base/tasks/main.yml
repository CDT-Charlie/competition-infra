- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - gnupg
      - software-properties-common
    state: present

# --- Active Directory (realmd/sssd): Ubuntu 20.04/22.04/24.04 desktop + server ---
- name: Include AD domain join tasks
  ansible.builtin.import_tasks: ad_domain_join.yml
  when: nix_ad_domain_join | default(false)
