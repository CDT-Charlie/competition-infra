---
# Base Linux role - Common Linux system setup
# This role provides basic Linux configuration that other roles can depend on

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - gnupg
      - software-properties-common
    state: present

# --- Active Directory (realmd/sssd): Ubuntu 20.04/22.04/24.04 desktop + server ---
- name: Include AD domain join tasks
  ansible.builtin.import_tasks: ad_domain_join.yml
  when: nix_ad_domain_join | default(false)
