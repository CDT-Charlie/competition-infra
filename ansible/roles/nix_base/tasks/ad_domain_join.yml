---
# realmd/sssd AD join — Ubuntu 20.04 / 22.04 / 24.04 (desktop and server).
# DNS must reach the DC for realm discovery; try systemd-resolved, then NetworkManager.

- name: Install packages for AD domain join
  ansible.builtin.apt:
    name:
      - realmd
      - sssd
      - sssd-tools
      - libnss-sss
      - libpam-sss
      - adcli
      - samba-common-bin
      - oddjob-mkhomedir
      - krb5-user
      - ldap-utils
    state: present

- name: Check current realm membership
  ansible.builtin.command: realm list
  register: nix_realm_list
  changed_when: false
  failed_when: false

- name: Start oddjobd for mkhomedir (if unit exists)
  ansible.builtin.systemd:
    name: oddjobd
    state: started
    enabled: true
  failed_when: false

- name: Wait for directory services on team DC (helps after DC playbook)
  ansible.builtin.wait_for:
    host: "{{ team_domain_controller_ip }}"
    port: 389
    timeout: 300
    delay: 3
    state: started
  when: ad_domain | lower not in (nix_realm_list.stdout | default('') | lower)
  ignore_errors: true

- name: Detect default IPv4 egress interface
  ansible.builtin.shell: |
    set -euo pipefail
    ip -4 route show default | head -1 | awk '{for (i=1;i<=NF;i++) if ($i=="dev") {print $(i+1); exit}}'
  args:
    executable: /bin/bash
  register: nix_default_iface
  changed_when: false
  failed_when: false
  when: ad_domain | lower not in (nix_realm_list.stdout | default('') | lower)

- name: Point DNS at team DC via systemd-resolved (resolvectl)
  ansible.builtin.command:
    argv:
      - resolvectl
      - dns
      - "{{ nix_default_iface.stdout | trim }}"
      - "{{ team_domain_controller_ip }}"
      - "1.1.1.1"
  when:
    - ad_domain | lower not in (nix_realm_list.stdout | default('') | lower)
    - nix_default_iface.stdout | default('') | trim | length > 0
  register: nix_dns_resolved
  failed_when: false
  changed_when: nix_dns_resolved.rc == 0

- name: Flush systemd-resolved cache after DNS update
  ansible.builtin.command: resolvectl flush-caches
  when:
    - nix_dns_resolved is defined
    - nix_dns_resolved is changed
  failed_when: false

- name: Point DNS via NetworkManager (Ubuntu Desktop fallback)
  ansible.builtin.shell: |
    set -euo pipefail
    CON=$(nmcli -t -f NAME con show --active | head -1)
    if [ -z "$CON" ]; then exit 0; fi
    nmcli con mod "$CON" ipv4.dns "{{ team_domain_controller_ip }} 1.1.1.1" ipv4.ignore-auto-dns yes
    nmcli con up "$CON"
  args:
    executable: /bin/bash
  when:
    - ad_domain | lower not in (nix_realm_list.stdout | default('') | lower)
    - >-
      (nix_dns_resolved is not defined) or (nix_dns_resolved is skipped)
      or (nix_dns_resolved.failed | default(false))
      or ((nix_dns_resolved.rc | default(1)) != 0)
  register: nix_dns_nm
  failed_when: false
  changed_when: nix_dns_nm.rc == 0

- name: Join system to Active Directory domain
  ansible.builtin.shell: |
    set -euo pipefail
    printf '%s\n' '{{ ad_domain_join.password }}' | realm join -U {{ ad_domain_join.username | quote }} {{ ad_domain | quote }}
  args:
    executable: /bin/bash
  no_log: true
  when: ad_domain | lower not in (nix_realm_list.stdout | default('') | lower)
  register: nix_realm_join

- name: Create home directories for domain logins
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    line: "session optional pam_mkhomedir.so skel=/etc/skel umask=0022"
    state: present
    create: false
  failed_when: false

- name: Allow Domain Admins full sudo via SSSD
  ansible.builtin.copy:
    dest: /etc/sudoers.d/99-ad-domain-admins
    mode: "0440"
    content: |
      %Domain\ Admins@{{ ad_domain }} ALL=(ALL:ALL) ALL
    validate: "/usr/sbin/visudo -cf %s"

- name: Restart SSSD after domain join
  ansible.builtin.service:
    name: sssd
    state: restarted
  when:
    - nix_realm_join is defined
    - nix_realm_join is changed
  failed_when: false
