---
- name: Ensure gnupg, curl, and tmux are installed
  ansible.builtin.apt:
    name:
      - gnupg
      - curl
      - tmux
    state: present
    update_cache: yes

- name: Setup NodeSource for Node.js 20.x
  ansible.builtin.shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list

- name: Install Node.js (which includes npm)
  ansible.builtin.apt:
    name: nodejs
    state: present

- name: Install Gemini CLI globally
  ansible.builtin.command: npm install -g @google/gemini-cli
  args:
    creates: /usr/bin/gemini

# ---------- System-wide API key (all users) ----------

- name: Deploy Gemini API key to /etc/profile.d (all users get it on login)
  ansible.builtin.template:
    src: gemini-profile.sh.j2
    dest: /etc/profile.d/gemini-api-key.sh
    owner: root
    group: root
    mode: "0644"

- name: Deploy Gemini API Key env file for systemd service
  ansible.builtin.template:
    src: gemini.env.j2
    dest: "/etc/default/ref-review-gemini"
    owner: root
    group: root
    mode: "0600"

# ---------- /etc/skel — future users ----------

- name: Create /etc/skel/.gemini directory (future users)
  ansible.builtin.file:
    path: /etc/skel/.gemini
    state: directory
    mode: "0755"

- name: Deploy settings.json to /etc/skel (future users get MCP config)
  ansible.builtin.template:
    src: gemini-settings.json.j2
    dest: /etc/skel/.gemini/settings.json
    mode: "0644"

- name: Deploy .env to /etc/skel (future users get API key)
  ansible.builtin.template:
    src: gemini-dotenv.j2
    dest: /etc/skel/.gemini/.env
    mode: "0644"

# ---------- All existing home directories ----------

- name: Find all existing home directories under /home
  ansible.builtin.find:
    paths: /home
    file_type: directory
    recurse: no
  register: home_dirs

- name: Create .gemini directory for all existing users
  ansible.builtin.file:
    path: "{{ item.path }}/.gemini"
    state: directory
    mode: "0755"
  loop: "{{ home_dirs.files }}"

- name: Deploy settings.json to all existing users (MCP auto-connect)
  ansible.builtin.template:
    src: gemini-settings.json.j2
    dest: "{{ item.path }}/.gemini/settings.json"
    mode: "0644"
  loop: "{{ home_dirs.files }}"

- name: Deploy .env to all existing users (API key auto-discovery)
  ansible.builtin.template:
    src: gemini-dotenv.j2
    dest: "{{ item.path }}/.gemini/.env"
    mode: "0644"
  loop: "{{ home_dirs.files }}"

# ---------- Greyteam domain user (may not be under /home) ----------

- name: Create Gemini CLI configuration directory for greyteam
  ansible.builtin.file:
    path: "{{ ref_review_mcp.ssh_home }}/.gemini"
    state: directory
    owner: "{{ ref_review_mcp.file_owner }}"
    group: "{{ ref_review_mcp.file_group }}"
    mode: "0755"

- name: Deploy settings.json for greyteam
  ansible.builtin.template:
    src: gemini-settings.json.j2
    dest: "{{ ref_review_mcp.ssh_home }}/.gemini/settings.json"
    owner: "{{ ref_review_mcp.file_owner }}"
    group: "{{ ref_review_mcp.file_group }}"
    mode: "0644"

- name: Deploy .env for greyteam
  ansible.builtin.template:
    src: gemini-dotenv.j2
    dest: "{{ ref_review_mcp.ssh_home }}/.gemini/.env"
    owner: "{{ ref_review_mcp.file_owner }}"
    group: "{{ ref_review_mcp.file_group }}"
    mode: "0644"

# ---------- Systemd service ----------

- name: Deploy ref-review systemd service (tmux wrapper)
  ansible.builtin.template:
    src: ref-review.service.j2
    dest: /etc/systemd/system/ref-review.service
    owner: root
    group: root
    mode: "0644"

- name: Enable and restart ref-review service
  ansible.builtin.systemd:
    name: ref-review
    enabled: true
    state: restarted
    daemon_reload: true
