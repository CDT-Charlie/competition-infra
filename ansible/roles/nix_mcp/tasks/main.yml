---
# Ref Review MCP — Grey Team read-only tampering inspector (stdio MCP + SSH to Blue Linux).
# Requires domain greyteam (nix_base / realm permit). MCP SSH keys: deploy_greyteam_mcp_ssh.yml + scripts/deploy-greyteam-mcp-ssh.sh.
# PyPI package "mcp" requires Python >=3.10; Ubuntu 20.04 default python3 is 3.8 — see python3.10 tasks below.

- name: Install Python venv, pip, and SSH client for Ref Review MCP
  ansible.builtin.apt:
    name:
      - python3
      - python3-venv
      - python3-pip
      - openssh-client
    state: present
    update_cache: true

# Ubuntu 20.04: python3.10 is in Universe; minimal/cloud images often have only "main" enabled.
# If apt still cannot see python3.10, deadsnakes PPA provides it (disable via ref_review_mcp.focal_use_deadsnakes_ppa).
- name: Install add-apt-repository helper on Ubuntu 20.04
  ansible.builtin.apt:
    name: software-properties-common
    state: present
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_version == "20.04"

- name: Enable Ubuntu Universe on 20.04 (python3.10 package source)
  ansible.builtin.command: add-apt-repository -y universe
  register: ref_review_mcp_univ
  changed_when: false
  failed_when: false
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_version == "20.04"
    - ref_review_mcp.focal_enable_universe | default(true) | bool

- name: Add deadsnakes PPA on Ubuntu 20.04 (fallback python3.10 when Universe unavailable)
  ansible.builtin.command: add-apt-repository -y ppa:deadsnakes/ppa
  register: ref_review_mcp_deadsnakes
  changed_when: false
  failed_when: false
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_version == "20.04"
    - ref_review_mcp.focal_use_deadsnakes_ppa | default(true) | bool

- name: Install Python 3.10 for venv on Ubuntu 20.04 (MCP SDK needs >=3.10)
  ansible.builtin.apt:
    name:
      - python3.10
      - python3.10-venv
    state: present
    update_cache: true
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_distribution_version == "20.04"

- name: Set Ref Review venv Python executable
  ansible.builtin.set_fact:
    ref_review_mcp_venv_python: "{{ 'python3.10' if (ansible_distribution == 'Ubuntu' and ansible_distribution_version == '20.04') else 'python3' }}"

- name: Stat existing Ref Review venv interpreter
  ansible.builtin.stat:
    path: "{{ ref_review_mcp.install_dir }}/venv/bin/python"
  register: ref_review_mcp_venv_stat

- name: Check venv Python is MCP-compatible (>=3.10)
  ansible.builtin.command:
    cmd: "{{ ref_review_mcp.install_dir }}/venv/bin/python -c 'import sys; raise SystemExit(0 if sys.version_info >= (3, 10) else 1)'"
  register: ref_review_mcp_venv_ok
  changed_when: false
  failed_when: false
  when: ref_review_mcp_venv_stat.stat.exists | default(false)

- name: Remove incompatible Ref Review venv (e.g. built with Python 3.8 on 20.04)
  ansible.builtin.file:
    path: "{{ ref_review_mcp.install_dir }}/venv"
    state: absent
  when:
    - ref_review_mcp_venv_stat.stat.exists | default(false)
    - ref_review_mcp_venv_ok.rc | default(1) != 0

- name: Ensure Ref Review install directory exists
  ansible.builtin.file:
    path: "{{ ref_review_mcp.install_dir }}"
    state: directory
    owner: "{{ ref_review_mcp.file_owner }}"
    group: "{{ ref_review_mcp.file_group }}"
    mode: "0755"

- name: Create Python venv for Ref Review MCP
  ansible.builtin.command:
    cmd: "{{ ref_review_mcp_venv_python }} -m venv {{ ref_review_mcp.install_dir }}/venv"
    creates: "{{ ref_review_mcp.install_dir }}/venv/bin/python"

- name: Install / upgrade pip in venv
  ansible.builtin.pip:
    name: pip
    state: latest
    virtualenv: "{{ ref_review_mcp.install_dir }}/venv"

- name: Install MCP SDK into venv
  ansible.builtin.pip:
    name: "{{ ref_review_mcp.pip_packages }}"
    virtualenv: "{{ ref_review_mcp.install_dir }}/venv"

- name: Deploy ref_review_mcp.py
  ansible.builtin.copy:
    src: ref_review_mcp.py
    dest: "{{ ref_review_mcp.install_dir }}/ref_review_mcp.py"
    owner: "{{ ref_review_mcp.file_owner }}"
    group: "{{ ref_review_mcp.file_group }}"
    mode: "0755"

- name: Deploy Ref Review environment file
  ansible.builtin.template:
    src: ref_review_mcp.env.j2
    dest: "{{ ref_review_mcp.env_file }}"
    mode: "0644"

- name: Deploy Ref Review stdio launcher (Open WebUI command target)
  ansible.builtin.template:
    src: run-ref-review-mcp.sh.j2
    dest: "{{ ref_review_mcp.install_dir }}/run-ref-review-mcp.sh"
    owner: "{{ ref_review_mcp.file_owner }}"
    group: "{{ ref_review_mcp.file_group }}"
    mode: "0755"

- name: Ensure greyteam owns the venv tree (pip may run as root)
  ansible.builtin.file:
    path: "{{ ref_review_mcp.install_dir }}"
    owner: "{{ ref_review_mcp.file_owner }}"
    group: "{{ ref_review_mcp.file_group }}"
    recurse: true
