# Example only: pattern for "copy script + run on targets".
# Real Ref Review deployment uses the nix_mcp role from site.yml (tasks call files/uv-setup.sh on Ubuntu 20.04).
---
- name: Deploy Scored MCP Service to Target
  hosts: target_vms
  become: false # Script handles sudo internally where needed
  tasks:
    - name: Transfer and execute the setup script
      ansible.builtin.script: setup_mcp.sh
      args:
        executable: /bin/bash

    - name: Verify service status
      ansible.builtin.systemd:
        name: mcp-service
        state: started
      become: true
