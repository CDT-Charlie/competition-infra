---
# Ref Review MCP — defaults (override via group_vars/linux.yml → ref_review_mcp).
ref_review_mcp:
  install_dir: "/opt/ref_review_mcp"
  ssh_login: "greyteam@lakeplacid.local"
  ssh_home: "/home/greyteam@lakeplacid.local"
  ssh_identity_file: "/home/greyteam@lakeplacid.local/.ssh/id_ref_review_mcp"
  ssh_connect_timeout: 15
  allowed_subnets:
    - "10.100.2.0/24"
    - "10.100.3.0/24"
  poison_network: "10.100.1.0/24"
  pip_packages:
    - "mcp>=1.2.0"
  file_owner: "greyteam@lakeplacid.local"
  file_group: "domain users@lakeplacid.local"
  env_file: "/etc/default/ref_review_mcp"
