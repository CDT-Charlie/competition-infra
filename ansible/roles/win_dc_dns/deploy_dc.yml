---
# Standalone AD/DNS deployment wrapper for win_dc_dns role.
# Supports selecting the deployment scope with:
#   -e windows_dc_deployment_team=blue_team_1
#   -e windows_dc_deployment_team=blue_team_2
#   -e windows_dc_deployment_team=all

- name: Deploy AD/DNS for competition domain
  hosts: windows_dc
  vars:
    domain_name: "{{ windows_dc.domain_name }}"
    netbios_name: "{{ windows_dc.netbios_name }}"
    safe_mode_password: "{{ windows_dc.safe_mode_password }}"
    dc_hostname: "{{ default(inventory_hostname) }}"
    ou_name: "{{ windows_dc.ou_name }}"
    group_name: "{{ windows_dc.group_name }}"
    deployment_team: >-
      {{
        dc_team
        if (windows_dc_deployment_team | default(windows_dc.deployment_team | default('host_team'))) == 'host_team'
        else (windows_dc_deployment_team | default(windows_dc.deployment_team))
      }}
  roles:
    - win_base
    - win_dc_dns
