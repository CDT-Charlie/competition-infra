---
# Main competition playbook
# Order: bootstrap Windows -> promote DCs -> join members to AD -> services -> cleanup (Windows first,
# then Linux cyberrange last — see blue_team_users.yml).
#
# Alternative methods:
# - Deploy everything: ansible-playbook -i inventory.yml site.yml
# - Deploy one service: ansible-playbook -i inventory.yml site.yml --limit <group>
# - Cleanup users only: ansible-playbook -i inventory.yml blue_team_users.yml
#
# Services intentionally commented out are planned but not yet implemented.

- name: Bootstrap Windows management (required before Windows service roles)
  hosts: windows
  vars:
    new_user: "{{ windows_winrm.ansible_user.username }}"
    new_pass: "{{ windows_winrm.ansible_user.password }}"
    banner_dir: "{{ windows_winrm.banner.directory }}"
    banner_file: "{{ windows_winrm.banner.directory }}\\{{ windows_winrm.banner.filename }}"
    banner_text: "{{ windows_winrm.banner.text }}"
    service: "{{ windows_winrm.monitored_service }}"
  roles:
    - win_base
    - win_winrm

# Must run before member domain join (DNS + AD).
- name: Deploy Windows DNS / domain controller
  hosts: windows_dc
  vars:
    domain_name: "{{ windows_dc.domain_name }}"
    netbios_name: "{{ windows_dc.netbios_name }}"
    safe_mode_password: "{{ windows_dc.safe_mode_password }}"
    dc_hostname: "{{ windows_dc.dc_hostname | default(inventory_hostname) }}"
    ou_name: "{{ windows_dc.ou_name }}"
    group_name: "{{ windows_dc.group_name }}"
    deployment_team: >-
      {{
        dc_team
        if (windows_dc_deployment_team | default(windows_dc.deployment_team | default('host_team'))) == 'host_team'
        else (windows_dc_deployment_team | default(windows_dc.deployment_team))
      }}
  roles:
    - win_base
    - win_dc_dns

- name: Join Windows member servers to Active Directory
  hosts: "blue_windows:!windows_dc"
  gather_facts: true
  roles:
    - win_domain_join

- name: Deploy Windows SMB scored service
  hosts: windows_fileserver
  vars:
    share_name: "{{ windows_smb_ftp.smb.share_name }}"
    share_path: "{{ windows_smb_ftp.smb.share_path }}"
    allowed_group: "{{ windows_smb_ftp.smb.allowed_group }}"
    smb_user: "{{ windows_smb_ftp.smb.user }}"
    smb_password: "{{ windows_smb_ftp.smb.password }}"
    ftp_site_name: "{{ windows_smb_ftp.ftp.site_name }}"
    ftp_root: "{{ windows_smb_ftp.ftp.root_path }}"
    payload_path: "{{ windows_smb_ftp.ftp.payload_path }}"
    task_name: "{{ windows_smb_ftp.ftp.task_name }}"
  roles:
    - win_base
    - win_smb_ftp

- name: Deploy Linux Nginx/MySQL stack scored service
  hosts: webservers
  become: yes
  roles:
    - nix_base
    - nix_web_stack

- name: Deploy Linux Mail Server (Postfix + Dovecot)
  hosts: mail
  become: yes
  vars:
    C: "{{ mail_server.ssl.country }}"
    ST: "{{ mail_server.ssl.state }}"
    L: "{{ mail_server.ssl.locality }}"
    O: "{{ mail_server.ssl.organization }}"
    OU: "{{ mail_server.ssl.org_unit }}"
    CN: "{{ mail_server.ssl.common_name }}"
    pf_hostname: "{{ mail_server.postfix.hostname }}"
    pf_domain: "{{ mail_server.postfix.domain }}"
    pf_allowed_networks: "{{ mail_server.postfix.allowed_networks }}"
  roles:
    - nix_base
    - nix_mail

- name: Deploy Linux Grafana scored service
  hosts: monitoring_server
  become: yes
  vars:
    grafana_http_port: "{{ grafana.http_port }}"
    grafana_domain: "{{ grafana.domain }}"
    grafana_root_url: "{{ grafana.root_url }}"
    grafana_admin_user: "{{ grafana.admin_user }}"
    grafana_admin_password: "{{ grafana.admin_password }}"
    rsyslog_mode: "server"
  roles:
    - nix_base
    - nix_grafana
    - nix_rsyslog

- name: Deploy Linux rsyslog scored service (central)
  hosts: syslog_central
  become: yes
  vars:
    rsyslog_mode: "server"
  roles:
    - nix_base
    - nix_rsyslog

- name: Configure Linux rsyslog forwarding clients
  hosts: "blue_linux:!syslog_central"
  become: yes
  vars:
    rsyslog_mode: "client"
  roles:
    - nix_base
    - nix_rsyslog

# - name: Deploy Linux MCP scored service
#   hosts: mcp_hosts
#   become: yes
#   # TODO: enable when MCP server role/playbook exists.
#
# - name: Deploy Windows IIS scored service
#   hosts: windows_iis
#   # TODO: enable when IIS role/playbook exists.

- import_playbook: blue_team_users.yml
