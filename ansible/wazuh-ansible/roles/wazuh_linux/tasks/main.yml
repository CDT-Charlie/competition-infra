---
- name: Ensure required Wazuh variables exist
  assert:
    that:
      - wazuh_manager_ip is defined
      - wazuh_agent_group is defined
    fail_msg: "Missing wazuh_manager_ip or wazuh_agent_group"

- name: Install prerequisite packages
  apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true

- name: Ensure keyrings directory exists
  file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

- name: Download Wazuh GPG key
  get_url:
    url: "{{ wazuh_repo_key_url }}"
    dest: /tmp/wazuh.gpg
    mode: "0644"

- name: Convert Wazuh GPG key to keyring format
  command: >
    gpg --dearmor -o /usr/share/keyrings/wazuh.gpg /tmp/wazuh.gpg
  args:
    creates: /usr/share/keyrings/wazuh.gpg

- name: Add Wazuh repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/wazuh.gpg] {{ wazuh_repo_url }} stable main"
    state: present
    filename: wazuh

- name: Install Wazuh agent
  apt:
    name: wazuh-agent
    state: present
    update_cache: true

- name: Ensure Wazuh config directory exists
  file:
    path: /var/ossec/etc
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Set agent name in ossec-init.conf
  lineinfile:
    path: /var/ossec/etc/ossec-init.conf
    regexp: '^NAME='
    line: 'NAME="{{ wazuh_agent_name | default(inventory_hostname) }}"'
    create: true
    owner: root
    group: root
    mode: "0644"
  notify: restart wazuh agent

- name: Set manager IP in ossec-init.conf
  lineinfile:
    path: /var/ossec/etc/ossec-init.conf
    regexp: '^SERVER_IP='
    line: 'SERVER_IP="{{ wazuh_manager_ip }}"'
    create: true
    owner: root
    group: root
    mode: "0644"
  notify: restart wazuh agent

- name: Deploy ossec.conf from template
  template:
    src: ossec.conf.j2
    dest: "{{ wazuh_agent_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart wazuh agent

- name: Enable and start Wazuh agent service
  service:
    name: "{{ wazuh_agent_service_name }}"
    enabled: true
    state: started

- name: Wait for Wazuh agent service to settle
  pause:
    seconds: 5

- name: Check Wazuh agent service status
  command: systemctl is-active {{ wazuh_agent_service_name }}
  register: wazuh_linux_service_status
  changed_when: false
  failed_when: false

- name: Show Linux Wazuh status
  debug:
    msg:
      - "Host: {{ inventory_hostname }}"
      - "Manager: {{ wazuh_manager_ip }}"
      - "Group: {{ wazuh_agent_group }}"
      - "Service status: {{ wazuh_linux_service_status.stdout | default('unknown') }}"