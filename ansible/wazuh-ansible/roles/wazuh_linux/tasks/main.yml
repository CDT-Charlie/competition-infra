---
- name: Ensure required Wazuh variables exist
  assert:
    that:
      - wazuh_manager_ip is defined
    fail_msg: "Missing wazuh_manager_ip"

- name: Install prerequisite packages
  apt:
    name:
      - curl
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true

- name: Ensure keyrings directory exists
  file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"

- name: Download Wazuh GPG key
  get_url:
    url: "{{ wazuh_repo_key_url }}"
    dest: /tmp/wazuh.gpg
    mode: "0644"

- name: Convert Wazuh GPG key to keyring format
  command: >
    gpg --dearmor -o /usr/share/keyrings/wazuh.gpg /tmp/wazuh.gpg
  args:
    creates: /usr/share/keyrings/wazuh.gpg

- name: Add Wazuh repository
  apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/wazuh.gpg] {{ wazuh_repo_url }} stable main"
    state: present
    filename: wazuh

- name: Install Wazuh agent
  apt:
    name: wazuh-agent
    state: present
    update_cache: true

- name: Deploy ossec.conf
  template:
    src: ossec.conf.j2
    dest: /var/ossec/etc/ossec.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
  notify: restart wazuh agent

- name: Enable Wazuh agent service
  service:
    name: wazuh-agent
    enabled: true

- name: Restart Wazuh agent now
  meta: flush_handlers

- name: Check Wazuh agent status
  command: systemctl is-active wazuh-agent
  register: wazuh_linux_service_status
  changed_when: false
  failed_when: wazuh_linux_service_status.stdout.strip() != "active"