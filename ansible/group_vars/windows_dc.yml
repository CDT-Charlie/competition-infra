---
# Hosts in windows_dc (bardown). After DCPromo, WinRM usually needs a **domain** account, not local ansible.
# Toggle: windows_dc_winrm_use_domain_account in all.yml

ansible_connection: winrm
ansible_user: "{{ (windows_dc.netbios_name ~ '\\' ~ ad_domain_join.username) if (windows_dc_winrm_use_domain_account | default(false)) else 'ansible' }}"
ansible_password: "{{ ad_domain_join.password if (windows_dc_winrm_use_domain_account | default(false)) else windows_local_winrm_password }}"
ansible_port: 5986
ansible_winrm_scheme: https
ansible_winrm_transport: ntlm
ansible_winrm_server_cert_validation: ignore
