---
# Linux-specific variables

# Grafana
grafana:
  http_port: 3000
  domain: "CharlieGreyTeam"
  root_url: "http://CharlieGreyTeam: 3000/"
  admin_user: "admin"
  admin_password: "Password123!"

# Mail Server (Postfix + Dovecot)
mail_server:
  ssl:
    country: "US"
    state: "NewYork"
    locality: "Rochester"
    organization: "CSEC473"
    org_unit: "Charlie"
    common_name: "example.com"
  postfix:
    hostname: "smtp"
    domain: "example.com"
    allowed_networks: "10.0.100.0/24, 10.0.1.0/24"

# Web Stack (Nginx + MySQL)
web_stack:
  web_root: "/var/www/html/miracle_ice"
  mysql:
    root_password: "examplepassword"
    app_user: "greyteam"
    app_password: "testpass"
    database: "testdb"

# rsyslog
rsyslog:
  port: 514
  remote_log_dir: "/var/log/remote"
  logrotate_size: "100k"
  logrotate_rotate: 2

# Ref Review MCP (Grey Team tool on blue1/blue2-cross-check — stdio for Open WebUI)
# SSH uses domain principal (ssh -l greyteam@<ad_domain>) + optional identity file; see deploy_greyteam_mcp_ssh.yml.
ref_review_mcp:
  install_dir: "/opt/ref_review_mcp"
  ssh_login: "greyteam@{{ ad_domain }}"
  ssh_home: "/home/greyteam@{{ ad_domain }}"
  ssh_identity_file: "/home/greyteam@{{ ad_domain }}/.ssh/id_ref_review_mcp"
  ssh_connect_timeout: 15
  allowed_subnets:
    - "10.100.2.0/24"
    - "10.100.3.0/24"
  poison_network: "10.100.1.0/24"
  pip_packages:
    - "mcp>=1.2.0"
  # 20.04 only: see nix_mcp README — Universe + optional deadsnakes for python3.10.
  focal_enable_universe: true
  focal_use_deadsnakes_ppa: true
  # Owner = domain user; group = primary group from NSS (id / getent), not the UPN (chgrp cannot use user@realm).
  file_owner: "greyteam@{{ ad_domain }}"
  file_group: "domain users@{{ ad_domain }}"
  env_file: "/etc/default/ref_review_mcp"
