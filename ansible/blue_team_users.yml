---
# After AD join, roster accounts live in the domain only (from win_dc_dns).
# Imported last from site.yml. Order matters:
#   1) Windows cleanup first (still using WinRM as ansible / member auth).
#   2) Linux bootstrap user last — avoids deleting cyberrange before Windows work, and keeps
#      cyberrange removal as the final step of a full site.yml run.
#
# Linux: userdel fails with "user is currently used by process" if cyberrange has a login/session.
# force: true uses userdel --force so removal still runs (may drop the Ansible SSH session as it finishes).

- name: Remove bootstrap cyberrange from all Windows hosts
  hosts: blue_windows
  tasks:
    - name: Remove default cyberrange user from Windows
      ansible.windows.win_user:
        name: "{{ bootstrap_user.username }}"
        state: absent

    - name: Remove ansible automation user from Windows (not on domain controllers)
      ansible.windows.win_user:
        name: "{{ ansible_user }}"
        state: absent
      when: inventory_hostname not in (groups['windows_dc'] | default([]))

- name: Remove bootstrap cyberrange user from Linux (last — may terminate active cyberrange SSH)
  hosts: blue_linux
  become: true
  tasks:
    - name: Remove default cyberrange user from Linux
      ansible.builtin.user:
        name: "{{ bootstrap_user.username }}"
        state: absent
        remove: true
        force: true
