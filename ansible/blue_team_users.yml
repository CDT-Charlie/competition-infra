---
# After AD join, roster accounts live in the domain only (from win_dc_dns).
# Bootstrap: connect as cyberrange (see group_vars); imported last from site.yml so cyberrange
# is removed from every Blue Team host after all other plays (Linux + Windows, including DCs).

- name: Remove bootstrap cyberrange user from Linux
  hosts: blue_linux
  become: true
  tasks:
    - name: Remove default cyberrange user from Linux
      ansible.builtin.user:
        name: "{{ bootstrap_user.username }}"
        state: absent
        remove: true

- name: Remove bootstrap cyberrange from all Windows hosts
  hosts: blue_windows
  tasks:
    - name: Remove default cyberrange user from Windows
      ansible.windows.win_user:
        name: "{{ bootstrap_user.username }}"
        state: absent

    - name: Remove ansible automation user from Windows (not on domain controllers)
      ansible.windows.win_user:
        name: "{{ ansible_user }}"
        state: absent
      when: inventory_hostname not in (groups['windows_dc'] | default([]))
