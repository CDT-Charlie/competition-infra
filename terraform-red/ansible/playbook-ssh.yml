---
# Setup SSH servers on all red-team victim VMs.
# - Linux: install/enable openssh-server.
# - Windows: install OpenSSH Server (capability), start sshd, allow firewall.
#
# Run from terraform-red/ansible:
#   ansible-playbook -i inventory.yml playbook-ssh.yml
# Linux: use key or set ansible_user/ansible_ssh_private_key_file in group_vars.
# Windows: first run uses WinRM; pass -e ansible_user=Administrator -e ansible_password='...'

- name: Setup SSH server on Linux victims
  hosts: linux_victims
  become: true
  tasks:
    - name: Install OpenSSH server (Debian/Ubuntu)
      ansible.builtin.apt:
        name: openssh-server
        state: present
        update_cache: true

    - name: Ensure sshd is enabled and started
      ansible.builtin.service:
        name: ssh
        state: started
        enabled: true

- name: Setup OpenSSH Server on Windows victims
  hosts: windows_victims
  tasks:
    - name: Check if OpenSSH Server is already installed
      ansible.windows.win_shell: |
        (Get-WindowsCapability -Online -Name 'OpenSSH.Server~~~~0.0.1.0').State
      register: openssh_state
      changed_when: false

    - name: Install OpenSSH Server Windows capability
      ansible.windows.win_shell: |
        Add-WindowsCapability -Online -Name 'OpenSSH.Server~~~~0.0.1.0'
      when: (openssh_state.stdout | default('') | trim) != 'Installed'

    - name: Ensure sshd service is set to automatic and started
      ansible.windows.win_service:
        name: sshd
        start_mode: auto
        state: started

    - name: Allow SSH (port 22) in Windows Firewall
      ansible.windows.win_shell: |
        if (-not (Get-NetFirewallRule -DisplayName 'OpenSSH Server (sshd)' -ErrorAction SilentlyContinue)) {
          New-NetFirewallRule -DisplayName 'OpenSSH Server (sshd)' -Direction Inbound -Protocol TCP -Action Allow -LocalPort 22
        }
      changed_when: true
