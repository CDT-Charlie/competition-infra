---
# Linux victims: password-based SSH (CyberRange default account).
# We intentionally read the password from an environment variable so it is not committed to git.
#
# On the Ansible control node (your Kali), set:
#   export CYBERRANGE_PASSWORD='Cyberrange123!'
#
# If your images use a different default user, override `ansible_user` in inventory.yml per host.
ansible_user: cyberrange
ansible_password: "{{ lookup('env', 'CYBERRANGE_PASSWORD') }}"
ansible_become_password: "{{ lookup('env', 'CYBERRANGE_PASSWORD') }}"
