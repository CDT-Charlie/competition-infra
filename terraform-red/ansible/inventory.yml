# Red team victim VMs — update IPs to match terraform.tfvars after changes
# Or generate from Terraform: terraform -chdir=.. output -json victim_ips
all:
  children:
    linux_victims:
      hosts:
        red-victim-ubuntu1:
          ansible_host: 192.168.0.26
        red-victim-ubuntu2:
          ansible_host: 192.168.0.27
        red-victim-ubuntu3:
          ansible_host: 192.168.0.28
        red-victim-debian1:
          ansible_host: 192.168.0.29
        red-victim-debian2:
          ansible_host: 192.168.0.30
        red-victim-debian3:
          ansible_host: 192.168.0.31
    windows_victims:
      hosts:
        red-victim-winserv1:
          ansible_host: 192.168.0.23
        red-victim-winserv2:
          ansible_host: 192.168.0.24
        red-victim-winserv3:
          ansible_host: 192.168.0.25
  vars:
    ansible_ssh_common_args: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
